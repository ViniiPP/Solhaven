<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/png" href="/src/assetts/Solhaven.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Solhaven</title>
</head>

<body>
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="./src/assetts/background.mp4" type="video/mp4"/>
        Seu browser não suporta vídeo HTML5
    </video>

    <img src="./src/assetts/Solhaven.png" alt="Solhaven Logo" class="logo">

    <nav class="social-icons">
        <a href="https://www.instagram.com/viniipp" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://www.linkedin.com/in/vinicius-pereira-polli17" target="_blank" aria-label="Linkedin"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/ViniiPP" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
    </nav>

    <div class="player" id="player">

        <div class="player__info">
            <p class="player__track">Solhaven</p>
            <p class="player__artist">Lo-Fi</p>
        </div>

        <div class="player__controls">
            <button id="btn-prev" aria-label="Musica Anterior"><i class="fas fa-backward"></i></button>
            <button id="btn-play" aria-label="Play / Pause"><i class="fas fa-play"></i></button>
            <button id="btn-next" aria-label="Proxima Musica"><i class="fas fa-forward"></i></button>
        </div>

        <div class="player__extras">
            <input type="range" id="volume-slider" min="0" max="100" value="50" aria-label="Volume">
            <button id="btn-more" aria-label="Mais opções"><i class="fas fa-ellipsis-h"></i></button>
        </div>

        <div class="player__ambient" id="ambient-panel">
            <button data-sound="none"><i class="fas fa-volume-mute"></i> Silêncio</button>
            <button data-sound="rain"><i class="fas fa-cloud-rain"></i> Chuva</button>
            <button data-sound="fire"><i class="fas fa-fire"></i> Fogo</button>
        </div>

    </div>

    <div id="yt-player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="./script.js"></script>
</body>
</html>
